<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashon and retail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>

    <header id="Header">

        <div>
            <img src="./src/logo.webp" alt="Company Logo">
        </div>

        <nav class="menus">

            <a href="">Home</a>
            <a href="">
                <div>Shop</div><i class="fa-solid fa-angle-down"></i>
            </a>

            <a href="">
                <div>
                    Categories <span>Sale</span><i class="fa-solid fa-angle-down"></i>
                </div>
            </a>

            <a href="">
                <div>
                    Products <span>Hot</span><i class="fa-solid fa-angle-down"></i>
                </div>
            </a>

            <a href="">Top Deals</a>

            <a href="">Elements</a>

        </nav>

        <div>

            <div>
                <input type="search"><i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <div class="icons">

                <a href=""><i class="fa-solid fa-user"></i></a>

                <a href=""><i class="fa-solid fa-heart"></i><span>0</span></a>

                <a href=""><i class="fa-solid fa-cart-shopping"><span>0</span></i></a>

            </div>
        </div>


        <div class="toggle-btn">
            <i class="fa-solid fa-bars"></i>
        </div>

        <div class="close-btn">
            <i class="fa-solid fa-xmark"></i>
        </div>

    </header>

</body>

</html>
