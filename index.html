<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashon and retail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

</head>

<body>

    <header id="Header">

        <div class="logo">
            <img src="./src/logo.webp" alt="Company Logo">
        </div>

        <nav class="menus">

            <a href="">Home</a>

            <a href="">
                <div>Shop <i class="fa-solid fa-angle-down"></i></div>
            </a>

            <a href="">
                <div>
                    Categories <span class="tag">Sale</span><i class="fa-solid fa-angle-down"></i>
                </div>
            </a>

            <a href="">
                <div>
                    Products <span class="tag">Hot</span><i class="fa-solid fa-angle-down"></i>
                </div>
            </a>

            <a href="">Top Deals</a>

            <a href=""> <div>Elements <i class="fa-solid fa-angle-down"></i></div></a>

        </nav>

        <div class="navbarsec2">

            <div class="searchbar">
                <input type="search" placeholder="Search Here"><i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <div class="icons">

                <a href=""><i class="fa-solid fa-user"></i></a>

                <a href=""><i class="fa-solid fa-heart"></i><span class="badge">0</span></a>

                <a href=""><i class="fa-solid fa-cart-shopping"></i><span class="badge">0</span></a>

            </div>
        </div>


        <div class="toggle-btn">
            <i class="fa-solid fa-bars"></i>
        </div>

        <div class="close-btn">
            <i class="fa-solid fa-xmark"></i>
        </div>

    </header>

</html>
